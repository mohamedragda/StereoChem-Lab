<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StereoChem Visualizer</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        #container {
            width: 100%;
            height: 100vh;
            position: relative;
        }
        #buttons {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 10;
        }
        button {
            margin-right: 10px;
            padding: 10px;
            border: none;
            background-color: #3498db;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>
    <div id="buttons">
        <button onclick="showNewman()">Newman Projection</button>
        <button onclick="showSawhorse()">Sawhorse Projection</button>
    </div>
    <div id="container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer;
        let molecule;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer();
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('container').appendChild(renderer.domElement);

            camera.position.z = 5;
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            if (molecule) molecule.rotation.y += 0.01;
            renderer.render(scene, camera);
        }

        function showNewman() {
            // Clear the current molecule
            scene.clear();

            // Create Newman projection visualization
            const geometry = new THREE.SphereGeometry(1, 32, 32);
            const material = new THREE.MeshBasicMaterial({color: 0xff0000});
            molecule = new THREE.Mesh(geometry, material);
            scene.add(molecule);
        }

        function showSawhorse() {
            // Clear the current molecule
            scene.clear();

            // Create Sawhorse projection visualization
            const geometry = new THREE.BoxGeometry(1, 1, 1);
            const material = new THREE.MeshBasicMaterial({color: 0x0000ff});
            molecule = new THREE.Mesh(geometry, material);
            scene.add(molecule);
        }

        window.onload = init;
    </script>
</body>
</html>
